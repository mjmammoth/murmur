name: readme-tui-showcase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  refresh_readme_tui_showcase:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install TUI dependencies
        run: bun install --frozen-lockfile
        working-directory: tui

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install capture dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow cairosvg termtosvg

      - name: Generate showcase assets and update README
        run: python scripts/generate_tui_showcase.py

      - name: Commit and push README showcase updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/readme-assets/tui
          if git diff --cached --quiet; then
            echo "No README showcase changes."
            exit 0
          fi
          git commit -m "docs: refresh TUI showcase"
          git push
