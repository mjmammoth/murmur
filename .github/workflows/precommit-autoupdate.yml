name: precommit-autoupdate

on:
  schedule:
    - cron: "37 6 * * 1"
  workflow_dispatch:

concurrency:
  group: precommit-autoupdate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Update pre-commit hooks
        run: pre-commit autoupdate

      - name: Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          branch: automation/pre-commit-autoupdate
          delete-branch: true
          commit-message: "chore: pre-commit autoupdate"
          title: "chore: pre-commit autoupdate"
          body: |
            Automated weekly update of pinned pre-commit hook revisions.

            - Generated by `.github/workflows/precommit-autoupdate.yml`
          labels: |
            dependencies
            automation
