name: precommit-autoupdate

on:
  schedule:
    - cron: "37 6 * * 1"
  workflow_dispatch:

concurrency:
  group: precommit-autoupdate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Update pre-commit hooks
        run: pre-commit autoupdate

      - name: Create pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          branch: automation/pre-commit-autoupdate
          commit-message: "chore: pre-commit autoupdate"
          title: "chore: pre-commit autoupdate"
          body: |
            Automated weekly update of pinned pre-commit hook revisions.

            - Generated by `.github/workflows/precommit-autoupdate.yml`
          labels: |
            dependencies
            automation
