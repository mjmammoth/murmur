name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  precommit_guard:
    permissions:
      contents: read
    runs-on: macos-14
    env:
      MURMUR_SKIP_TUI_SHOWCASE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: "1.2.21"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Install TUI dependencies
        run: bun install --frozen-lockfile --os='*' --cpu='*'
        working-directory: tui

      - name: Run pre-commit on all files
        run: pre-commit run --all-files

  python_smoke_matrix:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: CLI smoke help
        run: python -m murmur.cli --help

      - name: CLI smoke status
        run: python -m murmur.cli status

      - name: CLI smoke trigger help
        run: python -m murmur.cli trigger --help

  python_checks:
    permissions:
      contents: read
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: python -m pip install --upgrade pip build mypy pytest pytest-cov ruff

      - name: Install project dependencies
        run: python -m pip install -e .

      - name: Lint
        run: ruff check src tests scripts

      - name: Type check
        run: mypy --ignore-missing-imports src/murmur/tui_runtime.py src/murmur/cli.py

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q --cov-report=xml:coverage.xml

      - name: CLI smoke (parser/help)
        env:
          PYTHONPATH: src
        run: |
          python -m murmur.cli --help
          python -m murmur.cli bridge --help
          python -m murmur.cli models --help

      - name: Build Python distributions
        run: |
          TUI_VERSION="$(python3 -c "import json,pathlib; print(json.loads(pathlib.Path('tui/package.json').read_text())['version'])")"
          SETUPTOOLS_SCM_PRETEND_VERSION="${TUI_VERSION}" python -m build

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-python-dist
          path: dist/*

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-coverage
          path: coverage.xml

  sonarcloud:
    permissions:
      contents: read
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [python_checks, tui_build_smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download Python coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-coverage
          path: .

      - name: Download TUI coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-tui-coverage
          path: tui/coverage

      - name: Normalize TUI LCOV paths for Sonar
        run: |
          if [ ! -f tui/coverage/lcov.info ]; then
            echo "Missing TUI coverage report at tui/coverage/lcov.info" >&2
            exit 1
          fi
          sed -i 's#^SF:src/#SF:tui/src/#' tui/coverage/lcov.info
          grep -m 5 '^SF:' tui/coverage/lcov.info

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  brew_formula_smoke:
    permissions:
      contents: read
    needs: [python_checks]
    runs-on: macos-14
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-python-dist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Simulate Homebrew formula install
        run: |
          python3.12 -m venv --system-site-packages --without-pip venv
          WHEEL="$(ls dist/*.whl | head -n 1)"
          # Mirrors formula: system python pip with --python targeting venv
          python3.12 -m pip --python=venv/bin/python install --no-cache-dir "${WHEEL}"

      - name: Verify CLI works (catches missing deps)
        run: |
          venv/bin/murmur --help
          venv/bin/murmur bridge --help

      - name: Startup timing smoke
        run: |
          python3.12 - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          import time

          fakebin = Path("fakebin")
          fakebin.mkdir(exist_ok=True)
          shim = fakebin / "whisper-cli"
          shim.write_text("#!/bin/sh\nexit 0\n", encoding="utf-8")
          shim.chmod(0o755)

          env = os.environ.copy()
          env["PATH"] = f"{fakebin.resolve()}:{env['PATH']}"
          env["MURMUR_TUI_BIN"] = "/usr/bin/true"

          cmd = ["venv/bin/murmur", "run", "--no-status-indicator"]

          def measure() -> float:
              started = time.perf_counter()
              completed = subprocess.run(
                  cmd,
                  env=env,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
                  check=False,
              )
              elapsed = time.perf_counter() - started
              if completed.returncode != 0:
                  raise SystemExit(
                      f"startup smoke command failed with exit code {completed.returncode}"
                  )
              return elapsed

          cold = measure()
          warm = measure()
          print(f"cold_start_seconds={cold:.3f}")
          print(f"warm_start_seconds={warm:.3f}")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("## Startup timing smoke\n")
                  handle.write(f"- cold start: {cold:.3f}s\n")
                  handle.write(f"- warm start: {warm:.3f}s\n")

          max_cold = 20.0
          max_warm = 10.0
          if cold > max_cold:
              raise SystemExit(
                  f"Cold startup {cold:.3f}s exceeds budget {max_cold:.1f}s"
              )
          if warm > max_warm:
              raise SystemExit(
                  f"Warm startup {warm:.3f}s exceeds budget {max_warm:.1f}s"
              )
          PY

  brew_formula_audit:
    permissions:
      contents: read
    needs: [python_checks, tui_build_smoke]
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Download wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-python-dist
          path: dist

      - name: Download TUI artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-tui-dist
          path: dist/tui

      - name: Render formula and register local tap
        run: |
          WHEEL_PATH="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          MANIFEST_VERSION="$(python3 .github/scripts/get_manifest_version.py dist/tui/manifest.json)"
          TUI_DARWIN_ARM64="dist/tui/murmur-tui-${MANIFEST_VERSION}-darwin-arm64.tar.gz"
          TUI_DARWIN_X64="dist/tui/murmur-tui-${MANIFEST_VERSION}-darwin-x64.tar.gz"
          TUI_LINUX_X64="dist/tui/murmur-tui-${MANIFEST_VERSION}-linux-x64.tar.gz"
          TUI_LINUX_ARM64="dist/tui/murmur-tui-${MANIFEST_VERSION}-linux-arm64.tar.gz"

          if [ -z "$WHEEL_PATH" ] || [ ! -f "$WHEEL_PATH" ]; then
            echo "Error: No wheel artifact found in dist/" >&2
            exit 1
          fi
          for file in "$TUI_DARWIN_ARM64" "$TUI_DARWIN_X64" "$TUI_LINUX_X64" "$TUI_LINUX_ARM64"; do
            if [ ! -f "$file" ]; then
              echo "Error: Missing TUI tarball $file" >&2
              exit 1
            fi
          done

          WHEEL_SHA="$(shasum -a 256 "$WHEEL_PATH" | awk '{print $1}')"
          TUI_DARWIN_ARM64_SHA="$(shasum -a 256 "$TUI_DARWIN_ARM64" | awk '{print $1}')"
          TUI_DARWIN_X64_SHA="$(shasum -a 256 "$TUI_DARWIN_X64" | awk '{print $1}')"
          TUI_LINUX_X64_SHA="$(shasum -a 256 "$TUI_LINUX_X64" | awk '{print $1}')"
          TUI_LINUX_ARM64_SHA="$(shasum -a 256 "$TUI_LINUX_ARM64" | awk '{print $1}')"
          WHEEL_VERSION="$(python3 .github/scripts/get_wheel_version.py "$WHEEL_PATH")"

          if [ "$MANIFEST_VERSION" != "$WHEEL_VERSION" ]; then
            echo "Error: TUI manifest version (${MANIFEST_VERSION}) differs from wheel metadata (${WHEEL_VERSION}) in CI artifacts" >&2
            exit 1
          fi

          TAP_DIR="$(mktemp -d)"
          mkdir -p "$TAP_DIR/Formula"

          python scripts/update_tap_formula.py \
            --version "$WHEEL_VERSION" \
            --wheel-url "file://$PWD/$WHEEL_PATH" \
            --wheel-sha256 "$WHEEL_SHA" \
            --tui-url-darwin-arm64 "file://$PWD/$TUI_DARWIN_ARM64" \
            --tui-sha256-darwin-arm64 "$TUI_DARWIN_ARM64_SHA" \
            --tui-url-darwin-x64 "file://$PWD/$TUI_DARWIN_X64" \
            --tui-sha256-darwin-x64 "$TUI_DARWIN_X64_SHA" \
            --tui-url-linux-x64 "file://$PWD/$TUI_LINUX_X64" \
            --tui-sha256-linux-x64 "$TUI_LINUX_X64_SHA" \
            --tui-url-linux-arm64 "file://$PWD/$TUI_LINUX_ARM64" \
            --tui-sha256-linux-arm64 "$TUI_LINUX_ARM64_SHA" \
            --repository "local/murmur" \
            --tap-repo-path "$TAP_DIR"

          # brew style/audit require formulae to live in a tap
          git -C "$TAP_DIR" init -q
          git -C "$TAP_DIR" config user.name "ci"
          git -C "$TAP_DIR" config user.email "ci@localhost"
          git -C "$TAP_DIR" add -A && git -C "$TAP_DIR" commit -q -m "ci"
          brew tap local/murmur-ci "$TAP_DIR"

      - name: Brew style check
        run: brew style --formula local/murmur-ci/murmur

      - name: Brew audit check
        run: brew audit --formula local/murmur-ci/murmur

  tui_build_smoke:
    permissions:
      contents: read
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: "1.2.21"

      - name: Install TUI dependencies
        run: bun install --frozen-lockfile --os='*' --cpu='*'
        working-directory: tui

      - name: Run TUI unit tests with coverage
        run: bun test --timeout 5000 --coverage
        working-directory: tui

      - name: Upload TUI coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-tui-coverage
          path: tui/coverage/lcov.info

      - name: Type check TUI
        run: bunx tsc --noEmit -p tui/tsconfig.json

      - name: Build TUI release artifact (smoke)
        run: bun run build:release
        working-directory: tui

      - name: Assert TUI artifacts exist for all targets
        run: |
          MANIFEST_VERSION="$(python3 .github/scripts/get_manifest_version.py dist/tui/manifest.json)"
          test -f dist/tui/darwin-arm64/murmur-tui
          test -f dist/tui/darwin-x64/murmur-tui
          test -f dist/tui/linux-x64/murmur-tui
          test -f dist/tui/linux-arm64/murmur-tui
          test -f dist/tui/windows-x64/murmur-tui.exe
          test -f "dist/tui/murmur-tui-${MANIFEST_VERSION}-darwin-arm64.tar.gz"
          test -f "dist/tui/murmur-tui-${MANIFEST_VERSION}-darwin-x64.tar.gz"
          test -f "dist/tui/murmur-tui-${MANIFEST_VERSION}-linux-x64.tar.gz"
          test -f "dist/tui/murmur-tui-${MANIFEST_VERSION}-linux-arm64.tar.gz"
          test -f "dist/tui/murmur-tui-${MANIFEST_VERSION}-windows-x64.tar.gz"
          test -f dist/tui/manifest.json

      - name: Upload TUI artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ci-tui-dist
          path: dist/tui/*
