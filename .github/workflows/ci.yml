name: ci

on:
  push:
  pull_request:

jobs:
  python_checks:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: python -m pip install --upgrade pip build mypy pytest ruff

      - name: Install project dependencies
        run: python -m pip install -e .

      - name: Check version sync
        run: python scripts/check_version_sync.py

      - name: Lint
        run: ruff check src tests scripts

      - name: Type check
        run: mypy --ignore-missing-imports src/whisper_local/tui_runtime.py src/whisper_local/cli.py

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q

      - name: CLI smoke (parser/help)
        env:
          PYTHONPATH: src
        run: |
          python -m whisper_local.cli --help
          python -m whisper_local.cli bridge --help
          python -m whisper_local.cli models --help

      - name: Build Python distributions
        run: python -m build

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-python-dist
          path: dist/*

  brew_formula_smoke:
    needs: [python_checks]
    runs-on: macos-14
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-python-dist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Simulate Homebrew formula install
        run: |
          python3.12 -m venv --system-site-packages --without-pip venv
          WHEEL="$(ls dist/*.whl | head -n 1)"
          # Mirrors formula: system python pip with --python targeting venv
          python3.12 -m pip --python=venv/bin/python install --no-cache-dir "${WHEEL}"

      - name: Verify CLI works (catches missing deps)
        run: |
          venv/bin/whisper-local --help
          venv/bin/whisper-local bridge --help

      - name: Startup timing smoke
        run: |
          python3.12 - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          import time

          fakebin = Path("fakebin")
          fakebin.mkdir(exist_ok=True)
          shim = fakebin / "whisper-cli"
          shim.write_text("#!/bin/sh\nexit 0\n", encoding="utf-8")
          shim.chmod(0o755)

          env = os.environ.copy()
          env["PATH"] = f"{fakebin.resolve()}:{env['PATH']}"
          env["WHISPER_LOCAL_TUI_BIN"] = "/usr/bin/true"

          cmd = ["venv/bin/whisper-local", "run", "--no-status-indicator"]

          def measure() -> float:
              started = time.perf_counter()
              completed = subprocess.run(
                  cmd,
                  env=env,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
                  check=False,
              )
              elapsed = time.perf_counter() - started
              if completed.returncode != 0:
                  raise SystemExit(
                      f"startup smoke command failed with exit code {completed.returncode}"
                  )
              return elapsed

          cold = measure()
          warm = measure()
          print(f"cold_start_seconds={cold:.3f}")
          print(f"warm_start_seconds={warm:.3f}")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("## Startup timing smoke\n")
                  handle.write(f"- cold start: {cold:.3f}s\n")
                  handle.write(f"- warm start: {warm:.3f}s\n")

          max_cold = 20.0
          max_warm = 10.0
          if cold > max_cold:
              raise SystemExit(
                  f"Cold startup {cold:.3f}s exceeds budget {max_cold:.1f}s"
              )
          if warm > max_warm:
              raise SystemExit(
                  f"Warm startup {warm:.3f}s exceeds budget {max_warm:.1f}s"
              )
          PY

  tui_build_smoke:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install TUI dependencies
        run: bun install --frozen-lockfile
        working-directory: tui

      - name: Type check TUI
        run: bunx tsc --noEmit -p tui/tsconfig.json

      - name: Build TUI release artifact (smoke)
        run: bun run build:release
        working-directory: tui

      - name: Assert TUI artifacts exist
        run: |
          test -f dist/tui/darwin-arm64/whisper-local-tui
          test -f dist/tui/whisper-local-tui-darwin-arm64.tar.gz
          test -f dist/tui/manifest.json

      - name: Upload TUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-tui-dist
          path: dist/tui/*
