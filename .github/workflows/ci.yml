name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python_smoke_matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: CLI smoke
        run: |
          python -m whisper_local.cli --help
          python -m whisper_local.cli status
          python -m whisper_local.cli trigger --help

  python_checks:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: python -m pip install --upgrade pip build mypy pytest pytest-cov ruff

      - name: Install project dependencies
        run: python -m pip install -e .

      - name: Lint
        run: ruff check src tests scripts

      - name: Type check
        run: mypy --ignore-missing-imports src/whisper_local/tui_runtime.py src/whisper_local/cli.py

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q

      - name: CLI smoke (parser/help)
        env:
          PYTHONPATH: src
        run: |
          python -m whisper_local.cli --help
          python -m whisper_local.cli bridge --help
          python -m whisper_local.cli models --help

      - name: Build Python distributions
        run: python -m build
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-python-dist
          path: dist/*

  brew_formula_smoke:
    needs: [python_checks]
    runs-on: macos-14
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-python-dist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Simulate Homebrew formula install
        run: |
          python3.12 -m venv --system-site-packages --without-pip venv
          WHEEL="$(ls dist/*.whl | head -n 1)"
          # Mirrors formula: system python pip with --python targeting venv
          python3.12 -m pip --python=venv/bin/python install --no-cache-dir "${WHEEL}"

      - name: Verify CLI works (catches missing deps)
        run: |
          venv/bin/whisper-local --help
          venv/bin/whisper-local bridge --help

      - name: Startup timing smoke
        run: |
          python3.12 - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          import time

          fakebin = Path("fakebin")
          fakebin.mkdir(exist_ok=True)
          shim = fakebin / "whisper-cli"
          shim.write_text("#!/bin/sh\nexit 0\n", encoding="utf-8")
          shim.chmod(0o755)

          env = os.environ.copy()
          env["PATH"] = f"{fakebin.resolve()}:{env['PATH']}"
          env["WHISPER_LOCAL_TUI_BIN"] = "/usr/bin/true"

          cmd = ["venv/bin/whisper-local", "run", "--no-status-indicator"]

          def measure() -> float:
              started = time.perf_counter()
              completed = subprocess.run(
                  cmd,
                  env=env,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
                  check=False,
              )
              elapsed = time.perf_counter() - started
              if completed.returncode != 0:
                  raise SystemExit(
                      f"startup smoke command failed with exit code {completed.returncode}"
                  )
              return elapsed

          cold = measure()
          warm = measure()
          print(f"cold_start_seconds={cold:.3f}")
          print(f"warm_start_seconds={warm:.3f}")

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("## Startup timing smoke\n")
                  handle.write(f"- cold start: {cold:.3f}s\n")
                  handle.write(f"- warm start: {warm:.3f}s\n")

          max_cold = 20.0
          max_warm = 10.0
          if cold > max_cold:
              raise SystemExit(
                  f"Cold startup {cold:.3f}s exceeds budget {max_cold:.1f}s"
              )
          if warm > max_warm:
              raise SystemExit(
                  f"Warm startup {warm:.3f}s exceeds budget {max_warm:.1f}s"
              )
          PY

  brew_formula_audit:
    needs: [python_checks, tui_build_smoke]
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-python-dist
          path: dist

      - name: Download TUI artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-tui-dist
          path: dist/tui

      - name: Render formula and register local tap
        run: |
          WHEEL_PATH="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          TUI_DARWIN_ARM64="dist/tui/whisper-local-tui-darwin-arm64.tar.gz"
          TUI_DARWIN_X64="dist/tui/whisper-local-tui-darwin-x64.tar.gz"
          TUI_LINUX_X64="dist/tui/whisper-local-tui-linux-x64.tar.gz"
          TUI_LINUX_ARM64="dist/tui/whisper-local-tui-linux-arm64.tar.gz"

          if [ -z "$WHEEL_PATH" ] || [ ! -f "$WHEEL_PATH" ]; then
            echo "Error: No wheel artifact found in dist/" >&2
            exit 1
          fi
          for file in "$TUI_DARWIN_ARM64" "$TUI_DARWIN_X64" "$TUI_LINUX_X64" "$TUI_LINUX_ARM64"; do
            if [ ! -f "$file" ]; then
              echo "Error: Missing TUI tarball $file" >&2
              exit 1
            fi
          done

          WHEEL_SHA="$(shasum -a 256 "$WHEEL_PATH" | awk '{print $1}')"
          TUI_DARWIN_ARM64_SHA="$(shasum -a 256 "$TUI_DARWIN_ARM64" | awk '{print $1}')"
          TUI_DARWIN_X64_SHA="$(shasum -a 256 "$TUI_DARWIN_X64" | awk '{print $1}')"
          TUI_LINUX_X64_SHA="$(shasum -a 256 "$TUI_LINUX_X64" | awk '{print $1}')"
          TUI_LINUX_ARM64_SHA="$(shasum -a 256 "$TUI_LINUX_ARM64" | awk '{print $1}')"
          VERSION="$(python - "$WHEEL_PATH" <<'PY'
          import sys
          import zipfile

          wheel_path = sys.argv[1]
          with zipfile.ZipFile(wheel_path) as wheel:
              metadata_path = next(
                  (
                      member
                      for member in wheel.namelist()
                      if member.endswith(".dist-info/METADATA")
                  ),
                  None,
              )
              if metadata_path is None:
                  raise SystemExit("Missing wheel METADATA file")

              version_line = next(
                  (
                      line
                      for line in wheel.read(metadata_path).decode("utf-8").splitlines()
                      if line.startswith("Version: ")
                  ),
                  None,
              )
              if version_line is None:
                  raise SystemExit("Missing Version field in wheel METADATA")

              print(version_line.split(": ", 1)[1].strip())
          PY
          )"

          TAP_DIR="$(mktemp -d)"
          mkdir -p "$TAP_DIR/Formula"

          python scripts/update_tap_formula.py \
            --version "$VERSION" \
            --wheel-url "file://$PWD/$WHEEL_PATH" \
            --wheel-sha256 "$WHEEL_SHA" \
            --tui-url-darwin-arm64 "file://$PWD/$TUI_DARWIN_ARM64" \
            --tui-sha256-darwin-arm64 "$TUI_DARWIN_ARM64_SHA" \
            --tui-url-darwin-x64 "file://$PWD/$TUI_DARWIN_X64" \
            --tui-sha256-darwin-x64 "$TUI_DARWIN_X64_SHA" \
            --tui-url-linux-x64 "file://$PWD/$TUI_LINUX_X64" \
            --tui-sha256-linux-x64 "$TUI_LINUX_X64_SHA" \
            --tui-url-linux-arm64 "file://$PWD/$TUI_LINUX_ARM64" \
            --tui-sha256-linux-arm64 "$TUI_LINUX_ARM64_SHA" \
            --repository "local/whisper-local" \
            --tap-repo-path "$TAP_DIR"

          # brew style/audit require formulae to live in a tap
          git -C "$TAP_DIR" init -q
          git -C "$TAP_DIR" config user.name "ci"
          git -C "$TAP_DIR" config user.email "ci@localhost"
          git -C "$TAP_DIR" add -A && git -C "$TAP_DIR" commit -q -m "ci"
          brew tap local/whisper-local-ci "$TAP_DIR"

      - name: Brew style check
        run: brew style --formula local/whisper-local-ci/whisper-local

      - name: Brew audit check
        run: brew audit --formula local/whisper-local-ci/whisper-local

  tui_build_smoke:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Install TUI dependencies
        run: bun install --frozen-lockfile --os='*' --cpu='*'
        working-directory: tui

      - name: Type check TUI
        run: bunx tsc --noEmit -p tui/tsconfig.json

      - name: Build TUI release artifact (smoke)
        run: bun run build:release
        working-directory: tui

      - name: Assert TUI artifacts exist for all targets
        run: |
          test -f dist/tui/darwin-arm64/whisper-local-tui
          test -f dist/tui/darwin-x64/whisper-local-tui
          test -f dist/tui/linux-x64/whisper-local-tui
          test -f dist/tui/linux-arm64/whisper-local-tui
          test -f dist/tui/windows-x64/whisper-local-tui.exe
          test -f dist/tui/whisper-local-tui-darwin-arm64.tar.gz
          test -f dist/tui/whisper-local-tui-darwin-x64.tar.gz
          test -f dist/tui/whisper-local-tui-linux-x64.tar.gz
          test -f dist/tui/whisper-local-tui-linux-arm64.tar.gz
          test -f dist/tui/whisper-local-tui-windows-x64.tar.gz
          test -f dist/tui/manifest.json

      - name: Upload TUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-tui-dist
          path: dist/tui/*
