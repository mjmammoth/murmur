name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

jobs:
  secret_scan:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.2"
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          CHECKSUMS="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}" -o "${TARBALL}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${CHECKSUMS}" -o "${CHECKSUMS}"
          if ! grep -q " ${TARBALL}$" "${CHECKSUMS}"; then
            echo "Missing checksum entry for ${TARBALL}"
            exit 1
          fi
          sha256sum --ignore-missing -c "${CHECKSUMS}"
          tar -xzf "${TARBALL}" gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          gitleaks git \
            --config .gitleaks.toml \
            --redact \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Run gitleaks (full history)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          gitleaks git \
            --config .gitleaks.toml \
            --redact

  python_dependency_audit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tooling and project
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip install -e .

      - name: Run pip-audit
        env:
          PYTHON: python
        run: scripts/ci/run_pip_audit.sh

  tui_dependency_audit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.2.21"

      - name: Install TUI dependencies
        run: bun install --frozen-lockfile
        working-directory: tui

      - name: Run Bun audit
        run: bun audit --audit-level high
        working-directory: tui
