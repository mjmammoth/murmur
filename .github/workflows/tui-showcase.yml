name: tui-showcase

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "README.md"
      - "docs/assets/tui-home-themes.png"
      - "tui/src/**"
      - "tui/scripts/mock-demo-backend.ts"
      - "scripts/generate_tui_showcase.py"
      - "scripts/termtosvg_compat.py"
      - "scripts/requirements-tui-showcase.txt"
  push:
    branches: [main]
    paths:
      - "tui/src/**"
      - "tui/scripts/mock-demo-backend.ts"
      - "scripts/generate_tui_showcase.py"
      - "scripts/termtosvg_compat.py"
      - "scripts/requirements-tui-showcase.txt"

jobs:
  generate:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TZ: UTC
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: "1.2.21"

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "22.11.0"

      - name: Install Python dependencies
        run: python -m pip install --requirement scripts/requirements-tui-showcase.txt

      - name: Install TUI dependencies
        run: bun install --frozen-lockfile
        working-directory: tui

      - name: Install Playwright and Chromium
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Generate showcase
        run: python scripts/generate_tui_showcase.py --output-format png --png-scale 2

      - name: Check showcase drift (pull requests)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md docs/assets/tui-home-themes.png; then
            echo "Showcase is up to date."
            exit 0
          fi
          echo "TUI showcase drift detected. Regenerate and commit these files:" >&2
          echo "  - README.md" >&2
          echo "  - docs/assets/tui-home-themes.png" >&2
          git --no-pager diff -- README.md docs/assets/tui-home-themes.png
          exit 1

      - name: Commit and push if changed
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if [[ -f docs/assets/tui-home-themes.svg ]] || git ls-files --error-unmatch docs/assets/tui-home-themes.svg >/dev/null 2>&1; then
            git add -A docs/assets/tui-home-themes.svg
          fi
          if [[ -f docs/assets/tui-home-themes.png ]] || git ls-files --error-unmatch docs/assets/tui-home-themes.png >/dev/null 2>&1; then
            git add -A docs/assets/tui-home-themes.png
          fi
          if git diff --cached --quiet; then
            echo "No showcase changes to commit."
          else
            git commit -m "docs: refresh TUI showcase"
            branch="${GITHUB_REF_NAME:-main}"
            max_attempts=3
            attempt=1

            while [ "${attempt}" -le "${max_attempts}" ]; do
              if git push origin "HEAD:${branch}"; then
                echo "Push succeeded on attempt ${attempt}."
                break
              fi

              if [ "${attempt}" -eq "${max_attempts}" ]; then
                echo "Push failed after ${max_attempts} attempts."
                exit 1
              fi

              echo "Push failed on attempt ${attempt}; rebasing onto origin/${branch} and retrying."
              git fetch origin "${branch}"
              if ! git rebase "origin/${branch}"; then
                echo "Rebase failed due to conflicts; aborting."
                git rebase --abort || true
                exit 1
              fi

              attempt=$((attempt + 1))
            done
          fi
