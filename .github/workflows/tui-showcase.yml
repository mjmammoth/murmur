name: tui-showcase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tui/src/**"
      - "tui/scripts/mock-demo-backend.ts"
      - "scripts/generate_tui_showcase.py"
      - "scripts/termtosvg_compat.py"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install termtosvg pyte

      - name: Install TUI dependencies
        run: bun install --frozen-lockfile
        working-directory: tui

      - name: Install Playwright and Chromium
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Generate showcase
        run: python scripts/generate_tui_showcase.py --output-format png --png-scale 2

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/tui-home-themes.png docs/assets/tui-home-themes.svg README.md
          if git diff --cached --quiet; then
            echo "No showcase changes to commit."
          else
            git commit -m "docs: refresh TUI showcase"
            git push
          fi
