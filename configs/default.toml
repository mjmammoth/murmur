auto_copy = true
auto_paste = true
auto_revert_clipboard = true

[model]
name = "small"
runtime = "faster-whisper"
device = "cpu"
compute_type = "int8"

[hotkey]
mode = "ptt"
key = "f3"

[audio]
sample_rate = 48000

[audio.noise_suppression]
enabled = true
level = 2

[vad]
enabled = false
aggressiveness = 1
min_speech_ms = 200
max_silence_ms = 600

[output]
clipboard = true

[output.file]
enabled = false
path = "~/transcripts.txt"

[ui]
theme = "dark"
