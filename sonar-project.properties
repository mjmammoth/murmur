sonar.projectKey=mjmammoth_whisper.local
sonar.organization=mjmammoth
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

sonar.sources=src,scripts,tui/src
sonar.tests=tests,tui/src
sonar.test.inclusions=tests/**/*.py,tui/src/**/*.test.ts,tui/src/**/*.test.tsx
sonar.exclusions=dist/**,docs/assets/**,tui/dist/**

sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Keep tests analyzed, but suppress noisy style-only rules in test code.
sonar.issue.ignore.multicriteria=testsNamingMethods,testsNamingFields,testsEmptyMethods,testsMagicNumbers,testsDuplicatedStrings,testsComplexity,testsFunctionLength,testsParameterCount
sonar.issue.ignore.multicriteria.testsNamingMethods.ruleKey=python:S100
sonar.issue.ignore.multicriteria.testsNamingMethods.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.testsNamingFields.ruleKey=python:S116
sonar.issue.ignore.multicriteria.testsNamingFields.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.testsEmptyMethods.ruleKey=python:S1186
sonar.issue.ignore.multicriteria.testsEmptyMethods.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.testsMagicNumbers.ruleKey=python:S109
sonar.issue.ignore.multicriteria.testsMagicNumbers.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.testsDuplicatedStrings.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.testsDuplicatedStrings.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.testsComplexity.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.testsComplexity.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.testsFunctionLength.ruleKey=python:S138
sonar.issue.ignore.multicriteria.testsFunctionLength.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.testsParameterCount.ruleKey=python:S107
sonar.issue.ignore.multicriteria.testsParameterCount.resourceKey=tests/**/*
