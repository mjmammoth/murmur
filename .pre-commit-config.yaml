repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        entry: mypy src/
        additional_dependencies:
          - types-requests
        pass_filenames: false

  - repo: local
    hooks:
      - id: tui-typecheck
        name: TUI typecheck
        entry: bunx tsc --noEmit -p tui/tsconfig.json
        language: system
        pass_filenames: false
      - id: tui-showcase-refresh
        name: TUI showcase refresh (Ghostty)
        entry: scripts/precommit_tui_showcase.sh
        language: system
        pass_filenames: false
        always_run: true
